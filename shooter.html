<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Shooter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0d0d0d;
      color: #eee;
    }
    canvas {
      display: block;
      border: 2px solid #333;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
// ─── Constants & Config ───────────────────────────────────────────────────────
const W = 800, H = 600;
const HERO_SPEED = 200;
const BULLET_SPEED = 600;
const HERO_RADIUS = 14;
const MAX_PARTICLES = 200;
const WAVE_INTERVAL = 30; // seconds between wave escalations

const DIFFICULTIES = [
  { name: 'Recruit',   speed: 60,  spawnMs: 2500, maxEnemies: 5,  fireCooldown: 250 },
  { name: 'Soldier',   speed: 85,  spawnMs: 2000, maxEnemies: 8,  fireCooldown: 220 },
  { name: 'Veteran',   speed: 115, spawnMs: 1500, maxEnemies: 12, fireCooldown: 200 },
  { name: 'Elite',     speed: 150, spawnMs: 1000, maxEnemies: 18, fireCooldown: 180 },
  { name: 'Nightmare', speed: 200, spawnMs: 600,  maxEnemies: 28, fireCooldown: 160 },
];

const DIFF_BTN_W = 120, DIFF_BTN_H = 44, DIFF_BTN_GAP = 14;
const DIFF_BTNS = DIFFICULTIES.map((d, i) => {
  const totalW = 5 * DIFF_BTN_W + 4 * DIFF_BTN_GAP;
  const startX = (W - totalW) / 2;
  return { x: startX + i * (DIFF_BTN_W + DIFF_BTN_GAP), y: 310, w: DIFF_BTN_W, h: DIFF_BTN_H, tier: i };
});

// ─── State ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let gameState = 'START'; // 'START' | 'PLAYING' | 'GAMEOVER'
let selectedDiff = 0;
let score = 0;
let highScore = 0;
let killStreak = 0;
let multiplier = 1;
let waveTimer = 0;
let waveCount = 0;
let spawnTimer = 0;
let screenFlash = 0;

let diffConfig = {};
let currentSpeed, currentSpawnMs, currentMaxEnemies;

let hero = null;
let enemies = [];
let bullets = [];
let particles = [];

// ─── Input ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'Enter') {
    if (gameState === 'START') startGame();
    else if (gameState === 'GAMEOVER') startGame();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  if (gameState === 'START') {
    DIFF_BTNS.forEach(b => {
      if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) selectedDiff = b.tier;
    });
  }
});

// ─── Entity Classes ──────────────────────────────────────────────────────────
class Hero {
  constructor() {
    this.x = W / 2; this.y = H / 2;
    this.health = 3;
    this.facingDx = 0; this.facingDy = -1;
    this.shotCooldown = 0;
    this.invincible = 0;
  }

  update(dt) {
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'])  dx -= 1;
    if (keys['ArrowRight']) dx += 1;
    if (keys['ArrowUp'])    dy -= 1;
    if (keys['ArrowDown'])  dy += 1;

    if (dx !== 0 || dy !== 0) {
      const len = Math.sqrt(dx*dx + dy*dy);
      this.facingDx = dx / len;
      this.facingDy = dy / len;
      this.x += (dx / len) * HERO_SPEED * dt;
      this.y += (dy / len) * HERO_SPEED * dt;
    }

    this.x = Math.max(HERO_RADIUS, Math.min(W - HERO_RADIUS, this.x));
    this.y = Math.max(HERO_RADIUS, Math.min(H - HERO_RADIUS, this.y));

    this.shotCooldown -= dt;
    this.invincible -= dt;

    if (keys['Space'] && this.shotCooldown <= 0) {
      bullets.push(new Bullet(this.x, this.y, this.facingDx, this.facingDy));
      this.shotCooldown = diffConfig.fireCooldown / 1000;
    }
  }

  takeDamage() {
    if (this.invincible > 0) return;
    this.health--;
    this.invincible = 1.5;
    killStreak = 0;
    multiplier = 1;
    screenFlash = 0.3;
    if (this.health <= 0) endGame();
  }

  draw() {
    const blink = this.invincible > 0 && Math.floor(this.invincible * 8) % 2 === 0;
    if (blink) return;

    // health ring
    const ringFraction = this.health / 3;
    ctx.beginPath();
    ctx.arc(this.x, this.y, HERO_RADIUS + 4, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ringFraction);
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 3;
    ctx.stroke();

    // body
    ctx.beginPath();
    ctx.arc(this.x, this.y, HERO_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    // direction indicator
    const angle = Math.atan2(this.facingDy, this.facingDx);
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(HERO_RADIUS - 2, 0);
    ctx.lineTo(HERO_RADIUS - 9, -5);
    ctx.lineTo(HERO_RADIUS - 9, 5);
    ctx.closePath();
    ctx.fillStyle = '#00e5ff';
    ctx.fill();
    ctx.restore();
  }
}

class Enemy {
  constructor(x, y, speed, health, radius, color, type, points) {
    this.x = x; this.y = y;
    this.speed = speed;
    this.health = health; this.maxHealth = health;
    this.radius = radius;
    this.color = color;
    this.type = type;
    this.points = points;
    this.active = true;
  }

  update(dt) {
    const dx = hero.x - this.x, dy = hero.y - this.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len > 0) { this.x += (dx/len)*this.speed*dt; this.y += (dy/len)*this.speed*dt; }
  }

  takeDamage(amount) {
    this.health -= amount;
    if (this.health <= 0) { this.active = false; return true; }
    return false;
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }

  spawnParticles() {
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.5;
      const speed = 60 + Math.random() * 80;
      particles.push(new Particle(this.x, this.y, Math.cos(angle)*speed, Math.sin(angle)*speed, this.color));
    }
  }
}

class EnemyTank extends Enemy {
  constructor(x, y, speed) {
    super(x, y, speed * 0.6, 3, 18, '#f0a500', 'tank', 30);
    this.hitFlash = 0;
  }
  takeDamage(amount) {
    this.hitFlash = 0.15;
    return super.takeDamage(amount);
  }
  update(dt) {
    super.update(dt);
    this.hitFlash -= dt;
  }
  draw() {
    const s = this.radius * 2;
    ctx.fillStyle = this.hitFlash > 0 ? '#ffe066' : this.color;
    ctx.fillRect(this.x - this.radius, this.y - this.radius, s, s);
    // health pips
    for (let i = 0; i < this.maxHealth; i++) {
      ctx.fillStyle = i < this.health ? '#fff' : '#555';
      ctx.fillRect(this.x - 12 + i * 10, this.y - this.radius - 8, 8, 4);
    }
  }
}

class EnemyDasher extends Enemy {
  constructor(x, y, speed) {
    super(x, y, speed, 1, 9, '#9b59b6', 'dasher', 20);
    this.dashCooldown = 2 + Math.random() * 2;
    this.windup = 0;
    this.dashTime = 0;
    this.dashDx = 0; this.dashDy = 0;
  }
  update(dt) {
    if (this.dashTime > 0) {
      this.x += this.dashDx * this.speed * 3 * dt;
      this.y += this.dashDy * this.speed * 3 * dt;
      this.dashTime -= dt;
    } else if (this.windup > 0) {
      this.windup -= dt;
      if (this.windup <= 0) {
        const dx = hero.x - this.x, dy = hero.y - this.y;
        const len = Math.sqrt(dx*dx+dy*dy);
        this.dashDx = dx/len; this.dashDy = dy/len;
        this.dashTime = 0.4;
      }
    } else {
      super.update(dt);
      this.dashCooldown -= dt;
      if (this.dashCooldown <= 0) {
        this.windup = 0.4;
        this.dashCooldown = 2.5 + Math.random() * 2;
      }
    }
  }
  draw() {
    const blink = this.windup > 0 && Math.floor(this.windup * 12) % 2 === 0;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.beginPath();
    ctx.moveTo(0, -this.radius - 2);
    ctx.lineTo(this.radius + 2, this.radius + 2);
    ctx.lineTo(-this.radius - 2, this.radius + 2);
    ctx.closePath();
    ctx.fillStyle = blink ? '#ff99ff' : this.color;
    ctx.fill();
    ctx.restore();
  }
}

class Bullet {
  constructor(x, y, dx, dy) {
    this.x = x; this.y = y;
    this.dx = dx; this.dy = dy;
    this.active = true;
    this.trail = [];
  }
  update(dt) {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 4) this.trail.shift();
    this.x += this.dx * BULLET_SPEED * dt;
    this.y += this.dy * BULLET_SPEED * dt;
    if (this.x < -10 || this.x > W+10 || this.y < -10 || this.y > H+10) this.active = false;
  }
  draw() {
    const angle = Math.atan2(this.dy, this.dx);
    // trail
    this.trail.forEach((p, i) => {
      ctx.save();
      ctx.globalAlpha = (i + 1) / this.trail.length * 0.5;
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(-3, -1.5, 6, 3);
      ctx.restore();
    });
    // bullet
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(-3, -1.5, 6, 3);
    ctx.restore();
  }
}

class Particle {
  constructor(x, y, vx, vy, color) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.alpha = 1;
    this.size = 3 + Math.random() * 3;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.alpha -= dt * 2.5;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.restore();
  }
}

// ─── Spawning ─────────────────────────────────────────────────────────────────
function spawnEnemy() {
  if (enemies.length >= currentMaxEnemies) return;
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  const spread = (Math.random() - 0.5) * 80;
  if (edge === 0) { x = W/2 + spread; y = -20; }
  else if (edge === 1) { x = W+20; y = H/2 + spread; }
  else if (edge === 2) { x = W/2 + spread; y = H+20; }
  else { x = -20; y = H/2 + spread; }

  const roll = Math.random();
  let e;
  if (waveCount >= 6 && roll < 0.25) {
    e = new EnemyDasher(x, y, currentSpeed);
  } else if (waveCount >= 3 && roll < 0.35) {
    e = new EnemyTank(x, y, currentSpeed);
  } else {
    e = new Enemy(x, y, currentSpeed, 1, 12, '#e94560', 'drone', 10);
  }
  enemies.push(e);
}

// ─── Collision Detection ─────────────────────────────────────────────────────
function checkCollisions() {
  bullets.forEach(b => {
    if (!b.active) return;
    enemies.forEach(e => {
      if (!e.active) return;
      const dx = b.x - e.x, dy = b.y - e.y;
      if (dx*dx + dy*dy < e.radius*e.radius) {
        b.active = false;
        const dead = e.takeDamage(1);
        if (dead) {
          e.spawnParticles();
          const pts = Math.round(e.points * multiplier);
          score += pts;
          killStreak++;
          if (killStreak % 10 === 0) multiplier = Math.min(multiplier + 0.5, 5);
        }
      }
    });
  });

  enemies.forEach(e => {
    if (!e.active) return;
    const dx = hero.x - e.x, dy = hero.y - e.y;
    const minDist = HERO_RADIUS + e.radius - 4;
    if (dx*dx + dy*dy < minDist*minDist) {
      e.active = false;
      e.spawnParticles();
      hero.takeDamage();
    }
  });
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHeart(cx, cy, size, filled) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(size / 10, size / 10);
  ctx.beginPath();
  ctx.moveTo(0, -2);
  ctx.bezierCurveTo(0, -5, -5, -5, -5, -1);
  ctx.bezierCurveTo(-5, 3, 0, 6, 0, 8);
  ctx.bezierCurveTo(0, 6, 5, 3, 5, -1);
  ctx.bezierCurveTo(5, -5, 0, -5, 0, -2);
  ctx.fillStyle = filled ? '#e94560' : '#444';
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(`Score: ${score}`, 12, 28);
  if (multiplier > 1) {
    ctx.font = '14px monospace';
    ctx.fillStyle = '#ffd700';
    ctx.fillText(`x${multiplier.toFixed(1)}`, 120, 28);
  }

  ctx.font = '14px monospace';
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'center';
  ctx.fillText(`${DIFFICULTIES[selectedDiff].name}  |  Wave ${waveCount + 1}`, W/2, 22);

  for (let i = 0; i < 3; i++) {
    drawHeart(W - 30 - i * 26, 18, 14, i < hero.health);
  }

  if (highScore > 0) {
    ctx.font = '12px monospace';
    ctx.fillStyle = '#555';
    ctx.textAlign = 'left';
    ctx.fillText(`Best: ${highScore}`, 12, 48);
  }
}

// ─── Screens ─────────────────────────────────────────────────────────────────
function drawStartScreen() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 56px monospace';
  ctx.fillStyle = '#00e5ff';
  ctx.textAlign = 'center';
  ctx.fillText('SPACE SHOOTER', W/2, 120);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('Select difficulty, then press ENTER to start', W/2, 165);

  ctx.font = '13px monospace';
  ctx.fillStyle = '#666';
  ctx.fillText('Arrow keys: Move   |   Space: Shoot', W/2, 195);

  ctx.font = '13px monospace';
  ctx.fillStyle = '#555';
  ctx.fillText('Drone +10  |  Dasher +20  |  Tank +30  |  Kill streak = score multiplier', W/2, 220);

  DIFF_BTNS.forEach((b, i) => {
    const sel = i === selectedDiff;
    ctx.fillStyle = sel ? '#00e5ff' : '#1e1e2e';
    ctx.strokeStyle = sel ? '#00e5ff' : '#444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 6);
    ctx.fill();
    ctx.stroke();

    ctx.font = `bold 14px monospace`;
    ctx.fillStyle = sel ? '#000' : '#ccc';
    ctx.textAlign = 'center';
    ctx.fillText(`${i+1}. ${DIFFICULTIES[i].name}`, b.x + b.w/2, b.y + b.h/2 + 5);
  });

  if (highScore > 0) {
    ctx.font = '14px monospace';
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'center';
    ctx.fillText(`High Score: ${highScore}`, W/2, 390);
  }

  ctx.font = '18px monospace';
  ctx.fillStyle = Math.floor(Date.now()/500) % 2 === 0 ? '#fff' : '#888';
  ctx.textAlign = 'center';
  ctx.fillText('Press ENTER to Start', W/2, 440);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#e94560';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 60);

  ctx.font = '24px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`Score: ${score}`, W/2, H/2);

  ctx.font = '18px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.fillText(`High Score: ${highScore}`, W/2, H/2 + 36);

  ctx.font = '16px monospace';
  ctx.fillStyle = Math.floor(Date.now()/500) % 2 === 0 ? '#fff' : '#888';
  ctx.fillText('Press ENTER to play again', W/2, H/2 + 90);
}

// ─── Game Control ─────────────────────────────────────────────────────────────
function startGame() {
  diffConfig = DIFFICULTIES[selectedDiff];
  currentSpeed = diffConfig.speed;
  currentSpawnMs = diffConfig.spawnMs;
  currentMaxEnemies = diffConfig.maxEnemies;

  hero = new Hero();
  enemies = [];
  bullets = [];
  particles = [];
  score = 0;
  killStreak = 0;
  multiplier = 1;
  waveTimer = 0;
  waveCount = 0;
  spawnTimer = 0;
  screenFlash = 0;

  gameState = 'PLAYING';
}

function endGame() {
  if (score > highScore) highScore = score;
  gameState = 'GAMEOVER';
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update(dt) {
  if (gameState !== 'PLAYING') return;

  screenFlash -= dt;

  hero.update(dt);

  // wave escalation
  waveTimer += dt;
  if (waveTimer >= WAVE_INTERVAL) {
    waveTimer -= WAVE_INTERVAL;
    waveCount++;
    currentSpeed *= 1.08;
    currentSpawnMs *= 0.92;
    currentMaxEnemies = Math.min(currentMaxEnemies + 2, 50);
  }

  // spawning
  spawnTimer += dt * 1000;
  if (spawnTimer >= currentSpawnMs) {
    spawnTimer -= currentSpawnMs;
    spawnEnemy();
  }

  enemies.forEach(e => e.update(dt));
  bullets.forEach(b => b.update(dt));
  particles.forEach(p => p.update(dt));

  checkCollisions();

  enemies = enemies.filter(e => e.active);
  bullets = bullets.filter(b => b.active);
  particles = particles.filter(p => p.alpha > 0);
  if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
}

// ─── Render ──────────────────────────────────────────────────────────────────
function render() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'START') { drawStartScreen(); return; }

  particles.forEach(p => p.draw());
  enemies.forEach(e => e.draw());
  bullets.forEach(b => b.draw());
  if (hero) hero.draw();
  drawHUD();

  if (screenFlash > 0) {
    ctx.fillStyle = `rgba(233,69,96,${Math.min(screenFlash * 2, 0.35)})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (gameState === 'GAMEOVER') drawGameOver();
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
const FIXED_DT = 1000 / 60;
let accumulator = 0;
let lastTime = performance.now();

function gameLoop(timestamp) {
  let delta = timestamp - lastTime;
  lastTime = timestamp;
  delta = Math.min(delta, 100);
  accumulator += delta;
  while (accumulator >= FIXED_DT) {
    update(FIXED_DT / 1000);
    accumulator -= FIXED_DT;
  }
  render();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
