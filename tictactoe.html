<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
    }

    h1 { font-size: 2rem; margin-bottom: 1rem; letter-spacing: 2px; }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; }
    .cell.x { color: #e94560; }
    .cell.o { color: #53c0f0; }
    .cell.win { background: #0f3460; }

    #reset {
      margin-top: 1.5rem;
      padding: 0.6rem 1.8rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.2rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { color: #eee; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>
  <div id="score">
    X wins: <span id="xw">0</span>
    Draws: <span id="dw">0</span>
    O wins: <span id="ow">0</span>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    let scores = { X: 0, O: 0, D: 0 };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      statusEl.textContent = "X's turn";
      boardEl.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.i = i;
        cell.addEventListener('click', handleClick);
        boardEl.appendChild(cell);
      }
    }

    function handleClick(e) {
      const i = +e.currentTarget.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      const cell = e.currentTarget;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const winLine = getWin();
      if (winLine) {
        winLine.forEach(idx => boardEl.children[idx].classList.add('win'));
        statusEl.textContent = `${current} wins!`;
        scores[current]++;
        updateScore();
        over = true;
      } else if (board.every(Boolean)) {
        statusEl.textContent = "It's a draw!";
        scores.D++;
        updateScore();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.textContent = `${current}'s turn`;
      }
    }

    function getWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function updateScore() {
      document.getElementById('xw').textContent = scores.X;
      document.getElementById('ow').textContent = scores.O;
      document.getElementById('dw').textContent = scores.D;
    }

    document.getElementById('reset').addEventListener('click', init);
    init();
  </script>
</body>
</html>
